<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Point Count 🎮</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { display: ['Fredoka One', 'cursive'] },
        }
      }
    }
  </script>
  <style>
    /* ── Screen system ─────────────────────────────────────────── */
    .screen {
      position: fixed; inset: 0;
      width: 100%; height: 100%;        /* explicit size as fallback for inset */
      opacity: 0; pointer-events: none;
      transform: scale(.97);
      transition: opacity .3s ease, transform .3s ease;
    }
    .screen.active { opacity: 1; pointer-events: all; transform: scale(1); }

    /* ── Toggle button ─────────────────────────────────────────── */
    .btn-subtract { background: linear-gradient(135deg,#ee5a24,#c0392b); box-shadow: 0 4px 14px rgba(238,90,36,.45); }
    #toggle-btn:disabled { opacity: 0.38; cursor: not-allowed; box-shadow: none; }

    /* ── Player cell ───────────────────────────────────────────── */
    .player-area {
      position: relative;
      overflow: hidden;
      container-type: size;          /* enables cqw / cqh units inside */
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 4px 16px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.2);
      transition: transform .1s;
    }
    .player-area:active { transform: scale(.95); }
    .player-area.tapped { animation: tap-bounce .32s ease; }
    /* Focused player gets a bright ring */
    .player-area.focused {
      box-shadow: 0 0 0 4px white, 0 0 0 8px rgba(255,255,255,.35), 0 6px 20px rgba(0,0,0,.3);
      z-index: 2;
    }
    .player-area.tapped::after {
      content: '';
      position: absolute; inset: 0;
      background: white;
      border-radius: inherit;
      animation: shine-flash .32s ease forwards;
      pointer-events: none;
    }

    /* Font sizes that scale with each cell via container queries */
    .score-display {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.4rem, min(28cqw, 16cqh), 6rem);
      line-height: 1;
      letter-spacing: -.02em;
    }
    .name-display {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(.7rem, min(11cqw, 7cqh), 1.4rem);
      opacity: .92;
      line-height: 1.1;
    }
    .total-display {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(.6rem, min(9cqw, 5cqh), 1.1rem);
      opacity: .72;
      line-height: 1.2;
    }

    /* ── Floating score popup ──────────────────────────────────── */
    .float-score {
      position: fixed;
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.8rem, 7vw, 3rem);
      text-shadow: 2px 2px 8px rgba(0,0,0,.4);
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%,-50%);
      animation: float-up .85s ease-out forwards;
    }

    /* ── Safe-area insets for notch/home-bar devices ───────────── */
    .safe-top { padding-top:    max(10px, env(safe-area-inset-top))    !important; }
    .safe-bot { padding-bottom: max(10px, env(safe-area-inset-bottom)) !important; }

    /* ── Animations ────────────────────────────────────────────── */
    @keyframes tap-bounce {
      0%  { transform: scale(1); }
      40% { transform: scale(.88); }
      70% { transform: scale(1.06); }
      100%{ transform: scale(1); }
    }
    @keyframes shine-flash { from{ opacity:.3 } to{ opacity:0 } }
    @keyframes float-up {
      0%  { opacity:1; transform:translate(-50%,-50%) scale(1.3); }
      20% { opacity:1; transform:translate(-50%,-90%) scale(1.5); }
      100%{ opacity:0; transform:translate(-50%,-240%) scale(.8); }
    }
    @keyframes trophy-float { from{transform:translateY(0)} to{transform:translateY(-10px)} }
    @keyframes round-pop {
      0%  { color:#f9c74f; transform:scale(1.45); }
      100%{ color:#fff;    transform:scale(1);   }
    }
    @keyframes slide-in {
      from { opacity:0; transform:translateY(18px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes reset-shake {
      0%,100%{ transform:translateX(0) scale(1); }
      20%    { transform:translateX(-6px) scale(.97); }
      40%    { transform:translateX(6px) scale(.97); }
      60%    { transform:translateX(-4px); }
      80%    { transform:translateX(4px); }
    }

    .trophy-anim  { display:inline-block; animation:trophy-float 1s ease-in-out infinite alternate; }
    .round-pop    { animation:round-pop .5s ease forwards; }
    .score-item   { animation:slide-in .35s ease both; }
    .reset-shake  { animation:reset-shake .4s ease; }

    /* ── History modal ─────────────────────────────────────────── */
    #history-modal { opacity: 0; transition: opacity .25s ease; }
    #history-modal.modal-visible { opacity: 1; }
    #history-sheet { transition: transform .25s cubic-bezier(.32,1,.6,1); }
    #history-modal.modal-visible #history-sheet { transform: translateY(0) !important; }

    /* Hold-to-reset progress overlay */
    .player-area.holding::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: inherit;
      background: rgba(0,0,0,0);
      animation: hold-darken 0.5s linear forwards;
      pointer-events: none;
      z-index: 1;
    }
    @keyframes hold-darken {
      0%   { background: rgba(0,0,0,0); }
      100% { background: rgba(0,0,0,0.5); }
    }

    /* ── Misc ──────────────────────────────────────────────────── */
    body { overscroll-behavior: none; -webkit-tap-highlight-color: transparent; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
    /* prevent iOS auto-zoom on inputs */
    input[type=text], input[type=number] { font-size: 16px !important; }
  </style>
</head>

<body class="bg-[#160429] min-h-screen font-[Nunito] overflow-hidden">

  <!-- ══════════════════════════════════════════════════════
       SETUP SCREEN
  ═══════════════════════════════════════════════════════ -->
  <div id="setup-screen" class="screen active overflow-y-auto flex flex-col items-center
       bg-gradient-to-br from-[#160429] via-[#3a0c6e] to-[#160429]">
    <div class="w-full max-w-md px-4 py-6">
      <div class="bg-white rounded-3xl shadow-2xl p-6 flex flex-col gap-5">

        <h1 class="font-display text-5xl text-center text-purple-800"
            style="text-shadow:3px 3px 0 rgba(100,30,180,.12)">
          🎮 Point Count!
        </h1>

        <!-- Player count -->
        <div class="flex flex-col gap-2">
          <span class="text-[11px] font-black uppercase tracking-[2.5px] text-gray-400">Players</span>
          <div class="flex items-center gap-4">
            <button data-dir="-1"
              class="stepper-btn w-12 h-12 rounded-full bg-purple-700 text-white font-display text-3xl
                     shadow-md active:scale-90 transition-transform select-none
                     flex items-center justify-center leading-none pb-0.5">−</button>
            <span id="player-count-display"
              class="font-display text-5xl text-purple-700 min-w-[2.5rem] text-center tabular-nums">2</span>
            <button data-dir="1"
              class="stepper-btn w-12 h-12 rounded-full bg-purple-700 text-white font-display text-3xl
                     shadow-md active:scale-90 transition-transform select-none
                     flex items-center justify-center leading-none pb-0.5">+</button>
          </div>
        </div>

        <!-- Points per tap -->
        <div class="flex flex-col gap-2">
          <label for="points-per-round"
            class="text-[11px] font-black uppercase tracking-[2.5px] text-gray-400">
            Points per Tap
          </label>
          <input id="points-per-round" type="number" value="10" min="1" max="999"
            class="w-28 h-12 rounded-xl border-2 border-gray-200 text-center font-display
                   text-2xl text-gray-700 outline-none focus:border-purple-500 transition-colors bg-white" />
        </div>

        <!-- Per-player config rows -->
        <div id="player-configs" class="flex flex-col gap-3"></div>

        <button id="start-btn"
          class="w-full py-4 rounded-full font-display text-2xl text-white mt-1
                 bg-gradient-to-r from-purple-800 to-purple-500
                 shadow-lg shadow-purple-500/40 active:scale-95 transition-transform select-none">
          🚀 Start!
        </button>

        <button id="reset-config-btn"
          class="w-full py-2 rounded-full font-display text-sm text-gray-400
                 border-2 border-gray-200 active:scale-95 transition-transform select-none">
          🗑 Reset players
        </button>

      </div>
    </div>
  </div>


  <!-- ══════════════════════════════════════════════════════
       GAME SCREEN
  ═══════════════════════════════════════════════════════ -->
  <div id="game-screen" class="screen flex flex-col bg-[#0d0120]">

    <!-- Top bar -->
    <div class="flex-none flex items-center justify-between px-4 py-2
                bg-black/50 backdrop-blur-sm safe-top gap-3">
      <!-- Round number -->
      <div class="flex flex-col items-center leading-none">
        <span class="text-white/40 text-[9px] font-black uppercase tracking-[2.5px]">Round</span>
        <span id="round-display"
          class="font-display text-[2rem] text-white leading-none tabular-nums">1</span>
      </div>
      <!-- Round total (centre) -->
      <div class="flex flex-col items-center leading-none">
        <span class="text-white/40 text-[9px] font-black uppercase tracking-[2.5px]">Total</span>
        <span id="round-total"
          class="font-display text-[2rem] text-white leading-none tabular-nums">0</span>
      </div>
      <!-- Negate focused player button -->
      <button id="toggle-btn"
        class="btn-subtract h-10 px-4 rounded-full font-display text-sm text-white
               active:scale-90 transition-transform select-none"
        disabled>
        ➖ Select player
      </button>
    </div>

    <!-- Player grid (fills remaining space) -->
    <div id="players-grid"
      class="flex-1 min-h-0 grid auto-rows-fr gap-1.5 p-1.5 overflow-hidden"></div>

    <!-- Bottom bar -->
    <div class="flex-none flex items-center gap-2.5 px-4 py-2
                bg-black/50 backdrop-blur-sm safe-bot">
      <button id="history-btn"
        class="py-3 px-4 rounded-full font-display text-base text-white whitespace-nowrap
               bg-gradient-to-r from-indigo-500 to-purple-600
               shadow-lg active:scale-95 transition-transform select-none">
        📋
      </button>
      <button id="next-round-btn"
        class="flex-1 py-3 rounded-full font-display text-base text-white
               bg-gradient-to-r from-blue-500 to-violet-600
               shadow-lg active:scale-95 transition-transform select-none">
        ⏭ Next Round
      </button>
      <button id="end-session-btn"
        class="py-3 px-5 rounded-full font-display text-base text-white whitespace-nowrap
               bg-gradient-to-r from-orange-500 to-red-600
               shadow-lg active:scale-95 transition-transform select-none">
        🏁 End
      </button>
    </div>

  </div>

  <!-- ══════════════════════════════════════════════════════
       HISTORY MODAL
  ═══════════════════════════════════════════════════════ -->
  <div id="history-modal"
    class="hidden fixed inset-0 z-50 flex items-end justify-center
           bg-black/60 backdrop-blur-sm transition-opacity duration-250">
    <div class="w-full max-w-lg bg-white rounded-t-3xl shadow-2xl
                flex flex-col max-h-[80vh]
                translate-y-full transition-transform duration-250"
         id="history-sheet">
      <!-- Handle + header -->
      <div class="flex items-center justify-between px-5 pt-4 pb-3 border-b border-gray-100 shrink-0">
        <span class="font-display text-2xl text-purple-800">📋 Round History</span>
        <button id="history-close-btn"
          class="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center
                 font-display text-xl text-gray-500 active:scale-90 transition-transform">
          ✕
        </button>
      </div>
      <!-- Scrollable table -->
      <div id="history-content" class="overflow-y-auto px-3 pb-6 pt-2"></div>
    </div>
  </div>


  <!-- ══════════════════════════════════════════════════════
       RESULT SCREEN
  ═══════════════════════════════════════════════════════ -->
  <div id="result-screen" class="screen overflow-y-auto flex flex-col items-center
       bg-gradient-to-br from-[#160429] via-[#3a0c6e] to-[#160429]">
    <div class="w-full max-w-md px-4 py-6">
      <div class="bg-white rounded-3xl shadow-2xl p-7 flex flex-col items-center gap-6">
        <div id="winner-banner" class="text-center w-full"></div>
        <div id="scores-list" class="w-full flex flex-col gap-3"></div>
        <button id="play-again-btn"
          class="w-full py-4 rounded-full font-display text-2xl text-white
                 bg-gradient-to-r from-purple-800 to-purple-500
                 shadow-lg shadow-purple-500/40 active:scale-95 transition-transform select-none">
          🔄 Play Again!
        </button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
